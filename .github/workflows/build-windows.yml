name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AeroWire ${{ github.ref_name }}
          releaseBody: Automated Windows build for AeroWire.
          releaseDraft: true
          prerelease: false

      - name: Prepare portable app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/portable | Out-Null
          Copy-Item src-tauri/target/release/*.exe artifacts/portable/
          Compress-Archive -Path artifacts/portable/* -DestinationPath artifacts/AeroWire-portable-windows.zip -Force

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: AeroWire-portable-windows
          path: artifacts/AeroWire-portable-windows.zip
          if-no-files-found: error

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerowire-windows-bundles
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
